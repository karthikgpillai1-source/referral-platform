<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Premium Icons & Animations CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar" style="justify-content: center;">
            <div class="logo-container" style="align-items: center;">
                <span class="logo-main">🛡️ YOUTH AGAINST DRUGS</span>
                <span class="logo-sub">ADMIN PORTAL</span>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="container" style="max-width: 480px; padding: 48px 24px;">
        <div class="flat-card fade-in" style="padding: 40px 32px;">
            <h2 style="font-size: 32px; text-align: center; margin-bottom: 8px; font-weight: 800;">Admin Login</h2>
            <p style="text-align: center; margin-bottom: 32px; color: var(--text-muted); font-size: 14px;">
                Authenticate with your campaign admin credentials to access the management dashboard.
            </p>

            <form id="admin-login-form">
                <div class="form-group">
                    <label class="form-label" for="admin-email">Email Address</label>
                    <input type="email" id="admin-email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 32px;">
                    <label class="form-label" for="admin-password">Password</label>
                    <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-md" style="width: 100%; border-radius: var(--border-radius-sm);">
                    Sign In <i data-lucide="log-in" style="width: 18px; height: 18px;"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <!-- Shared Microinteractions & Cursor spotlight script -->
    <script>
        lucide.createIcons();

        // Mouse Spotlight Glow Coordinator
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        // GSAP page load
        gsap.from(".fade-in", {
            opacity: 0,
            y: 40,
            duration: 1,
            ease: "power3.out"
        });
    </script>
    <script type="module" src="js/pages/login.js?v=4"></script>
</body>
</html>
