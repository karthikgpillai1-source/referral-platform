<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container navbar" style="justify-content: center;">
            <div class="logo-container" style="align-items: center;">
                <div class="logo-main">Youth Against Drugs</div>
                <div class="logo-sub">Campaign Dashboard Portal</div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="container" style="max-width: 420px; padding: 60px 24px;">
        <div class="flat-card" style="padding: 32px 24px;">
            <h2 style="font-size: 28px; text-align: center; margin-bottom: 8px;">Admin Login</h2>
            <p style="text-align: center; margin-bottom: 24px;">
                Authenticate with your campaign admin credentials to access the management dashboard.
            </p>

            <form id="admin-login-form">
                <div class="form-group">
                    <label class="form-label" for="admin-email">Email Address</label>
                    <input type="email" id="admin-email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="admin-password">Password</label>
                    <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-md" style="width: 100%;">Sign In</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <!-- Page script -->
    <script type="module" src="js/pages/login.js?v=4"></script>
</body>
</html>
