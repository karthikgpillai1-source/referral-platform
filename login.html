<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Premium Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar" style="justify-content: center;">
            <div class="logo-container" style="display: flex; align-items: center; gap: 8px;">
                <span class="logo-main" style="display: inline-flex; align-items: center; gap: 6px;">
                    <i data-lucide="shield" style="width: 18px; height: 18px; color: var(--primary); stroke-width: 2.5; flex-shrink: 0;"></i>
                    YOUTH AGAINST DRUGS
                </span>
                <span class="logo-sub">ADMIN PORTAL</span>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="container" style="max-width: 440px; padding: 32px 16px;">
        <div class="flat-card fade-in" style="padding: 32px 24px;">
            <h2 style="font-size: 28px; text-align: center; margin-bottom: 8px; font-weight: 800; font-family: var(--font-heading);">Admin Login</h2>
            <p style="text-align: center; margin-bottom: 24px; color: var(--text-muted); font-size: 13px;">
                Authenticate with your campaign admin credentials to access the management dashboard.
            </p>

            <form id="admin-login-form">
                <div class="form-group-luxury">
                    <input type="email" id="admin-email" class="form-control-luxury" placeholder=" " required>
                    <label class="form-label-luxury" for="admin-email">Email Address</label>
                </div>
                <div class="form-group-luxury" style="margin-bottom: 24px;">
                    <input type="password" id="admin-password" class="form-control-luxury" placeholder=" " required>
                    <label class="form-label-luxury" for="admin-password">Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-md" style="width: 100%;">
                    Sign In <i data-lucide="log-in" style="width: 16px; height: 16px;"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <!-- Shared Microinteractions -->
    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="js/performance.js"></script>
    <script type="module" src="js/pages/login.js?v=4"></script>
</body>
</html>
