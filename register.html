<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Pledge - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Premium Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Animation Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-32);
            text-align: center;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
            margin-top: var(--space-48);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar" style="justify-content: center;">
            <div class="logo-container" style="display: flex; align-items: center; gap: 8px;">
                <span class="logo-main" style="display: inline-flex; align-items: center; gap: 6px;">
                    <i data-lucide="shield" style="width: 18px; height: 18px; color: var(--primary); stroke-width: 2.5; flex-shrink: 0;"></i>
                    YOUTH AGAINST DRUGS
                </span>
                <span class="logo-sub">PLEDGE REGISTRATION</span>
            </div>
        </div>
    </header>

    <!-- Centered Form Container -->
    <main class="container" style="max-width: 500px; padding: 0 var(--space-16);">

        <!-- NAME COLLECTION VIEW -->
        <div class="register-card fade-in">
            <h2 style="font-size: 28px; margin-bottom: 8px; font-weight: 800; font-family: var(--font-heading);">Take the Pledge</h2>
            <p style="margin-bottom: 32px; font-size: 13px; color: var(--text-muted);">Please provide your full name as you wish it to appear on your verified campaign certificate.</p>

            <div class="form-group-luxury" style="max-width: 400px; margin: 0 auto var(--space-24);">
                <input type="text" id="collect-name-input" class="form-control-luxury" placeholder=" " required minlength="3" maxlength="100" autocomplete="off" style="text-align: center;">
                <label class="form-label-luxury" for="collect-name-input" style="width: 100%; text-align: center; left: 0;">Enter your full name</label>
            </div>

            <button type="button" id="btn-continue-name" class="btn btn-primary btn-md" style="width: 100%; max-width: 400px;">
                Continue to Pledges <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="js/performance.js"></script>
    <script type="module" src="js/pages/register.js?v=5"></script>
</body>
</html>
