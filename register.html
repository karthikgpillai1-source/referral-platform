<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Pledge - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Premium Fonts & Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Animation Libraries CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <style>
        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-48);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: var(--space-64);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar" style="justify-content: center;">
            <div class="logo-container" style="align-items: center;">
                <span class="logo-main">🛡️ YOUTH AGAINST DRUGS</span>
                <span class="logo-sub">PLEDGE REGISTRATION</span>
            </div>
        </div>
    </header>

    <!-- Centered Form Container -->
    <main class="container" style="max-width: 600px; padding: 0 var(--space-24);">

        <!-- NAME COLLECTION VIEW -->
        <div class="register-card fade-in">
            <h2 style="font-size: 32px; margin-bottom: 12px; font-weight: 800; font-family: var(--font-heading);">Take the Pledge</h2>
            <p style="margin-bottom: 40px; font-size: 14px; color: var(--text-muted);">Please provide your full name as you wish it to appear on your verified campaign certificate.</p>

            <div class="form-group-luxury" style="max-width: 450px; margin: 0 auto var(--space-32);">
                <input type="text" id="collect-name-input" class="form-control-luxury" placeholder=" " required minlength="3" maxlength="100" autocomplete="off" style="text-align: center;">
                <label class="form-label-luxury" for="collect-name-input" style="width: 100%; text-align: center; left: 0;">Enter your full name</label>
            </div>

            <button type="button" id="btn-continue-name" class="btn btn-primary btn-md" style="width: 100%; max-width: 450px;">
                Continue to Pledges <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <!-- Shared Microinteractions & Cursor spotlight script -->
    <script>
        lucide.createIcons();

        // Mouse Spotlight Glow Coordinator (only active above 768px for performance)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                document.documentElement.style.setProperty('--mouse-x', `${x}%`);
                document.documentElement.style.setProperty('--mouse-y', `${y}%`);
            });
        }

        // GSAP page load
        gsap.from(".fade-in", {
            opacity: 0,
            y: 30,
            duration: 0.8,
            ease: "power3.out"
        });
    </script>
    <script type="module" src="js/pages/register.js?v=5"></script>
</body>
</html>
