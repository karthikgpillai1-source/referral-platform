<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Pledge - Youth Against Drugs</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container navbar" style="justify-content: center;">
            <div class="logo-container" style="align-items: center;">
                <div class="logo-main">🛡️ YOUTH AGAINST DRUGS</div>
                <div class="logo-sub">Youth Pledge & Outreach Campaign</div>
            </div>
        </div>
    </header>

    <!-- Centered Form Container -->
    <main class="container" style="max-width: 650px; padding: 40px 24px;">

        <!-- NAME COLLECTION VIEW -->
        <div id="step-name-container" style="text-align: center; padding: 20px 0;">
            <h2 style="font-size: 32px; margin-bottom: 8px;">Take the Pledge</h2>
            <p style="margin-bottom: 36px; font-size: 16px;">What is your full name?</p>

            <div class="form-group" style="margin-bottom: 32px; max-width: 500px; margin-left: auto; margin-right: auto;">
                <input type="text" id="collect-name-input" class="form-control" placeholder="Enter your full name" style="padding: 16px; font-size: 18px; text-align: center;" required minlength="3" maxlength="100" autocomplete="off">
            </div>

            <button type="button" id="btn-continue-name" class="btn btn-primary btn-md" style="width: 100%; max-width: 500px; padding: 14px; font-size: 16px;">
                Continue to Pledges ➡️
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Youth Against Drugs Campaign</p>
    </footer>

    <!-- Page script -->
    <script type="module" src="js/pages/register.js?v=5"></script>
</body>
</html>
